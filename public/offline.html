<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Offline · chatda</title>
  <style>
    html,body{margin:0;padding:0;height:100%;font-family:system-ui,-apple-system,"Plus Jakarta Sans",sans-serif;color:#fff;background:#1a1033}
    .wrap{min-height:100%;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;background:linear-gradient(165deg,#1a1033 0%,#2d1b4e 30%,#1a1033 60%,#0f1923 100%)}
    h1{font-size:clamp(1.75rem,4vw,2.5rem);font-weight:900;letter-spacing:-1px;margin:0 0 12px;background:linear-gradient(135deg,#FF6B35,#E84393,#6C5CE7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
    p{color:rgba(255,255,255,.65);font-size:16px;line-height:1.6;max-width:420px;margin:0 0 28px}
    button{font-family:inherit;font-size:15px;font-weight:700;padding:14px 32px;border-radius:999px;border:0;color:#fff;background:linear-gradient(135deg,#FF6B35,#E84393);cursor:pointer}
    button:hover{opacity:.9}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>You're offline</h1>
    <p>We couldn't reach chatda.life. Check your connection and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
