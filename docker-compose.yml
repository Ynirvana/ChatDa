services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatda
      POSTGRES_PASSWORD: chatda
      POSTGRES_DB: chatda
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatda -d chatda"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
